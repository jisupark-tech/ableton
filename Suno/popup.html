<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 16px;
      color: #fff;
    }
    label {
      display: block;
      margin-top: 10px;
      font-size: 12px;
      color: #aaa;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #fff;
      font-size: 13px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #6c63ff;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #5a52d5;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #4caf50; }
    .status.error { color: #f44336; }
  </style>
</head>
<body>
  <h2>Suno to Git Settings</h2>

  <label>GitHub Personal Access Token</label>
  <input type="password" id="token" placeholder="github_pat_xxxx..." />

  <label>GitHub Username</label>
  <input type="text" id="owner" placeholder="fpsjjang97-boop" />

  <label>Repository Name</label>
  <input type="text" id="repo" placeholder="suno" />

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
